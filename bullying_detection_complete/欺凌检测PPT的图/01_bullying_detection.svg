<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="iotdaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="modelartsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="alarmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="policeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    
    <marker id="arrowWhite" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#14b8a6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#3b82f6"/>
    </marker>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- ==================== 云侧 ==================== -->
  <rect x="40" y="30" width="1320" height="180" rx="20" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.4)" stroke-width="2"/>
  <text x="110" y="70" fill="#3b82f6" font-size="24" font-weight="700">☁️ 云侧</text>
  
  <rect x="60" y="90" width="150" height="100" rx="14" fill="url(#iotdaGrad)" filter="url(#shadow)"/>
  <text x="135" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">IoTDA</text>
  
  <rect x="240" y="90" width="150" height="100" rx="14" fill="url(#obsGrad)" filter="url(#shadow)"/>
  <text x="315" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">DIS+OBS</text>
  
  <rect x="420" y="90" width="170" height="100" rx="14" fill="url(#trainGrad)" filter="url(#shadow)"/>
  <text x="505" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">增量训练</text>
  
  <rect x="620" y="90" width="170" height="100" rx="14" fill="url(#modelartsGrad)" filter="url(#shadow)"/>
  <text x="705" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">ModelArts</text>
  
  <rect x="820" y="90" width="150" height="100" rx="14" fill="url(#edgeGrad)" filter="url(#shadow)"/>
  <text x="895" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">保卫处</text>
  
  <rect x="1000" y="90" width="150" height="100" rx="14" fill="url(#policeGrad)" filter="url(#shadow)"/>
  <text x="1075" y="150" fill="white" font-size="18" font-weight="600" text-anchor="middle">警察局</text>
  
  <rect x="1180" y="90" width="150" height="100" rx="14" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2"/>
  <text x="1255" y="150" fill="#fbbf24" font-size="18" font-weight="600" text-anchor="middle">家长</text>
  
  <!-- 云侧箭头 - 增加线条长度 -->
  <line x1="210" y1="140" x2="235" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="390" y1="140" x2="415" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="590" y1="140" x2="615" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="790" y1="140" x2="815" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="970" y1="140" x2="995" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="1150" y1="140" x2="1175" y2="140" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== 边侧 ==================== -->
  <rect x="40" y="260" width="1320" height="180" rx="20" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.4)" stroke-width="2"/>
  <text x="110" y="300" fill="#8b5cf6" font-size="24" font-weight="700">🖥️ 边侧</text>
  
  <rect x="60" y="320" width="200" height="100" rx="14" fill="url(#edgeGrad)" filter="url(#shadow)"/>
  <text x="160" y="380" fill="white" font-size="18" font-weight="600" text-anchor="middle">香橙派 AI Pro</text>
  
  <rect x="300" y="320" width="200" height="100" rx="14" fill="url(#modelartsGrad)" filter="url(#shadow)"/>
  <text x="400" y="380" fill="white" font-size="18" font-weight="600" text-anchor="middle">多模态AI推理</text>
  
  <rect x="540" y="320" width="200" height="100" rx="14" fill="url(#iotdaGrad)" filter="url(#shadow)"/>
  <text x="640" y="380" fill="white" font-size="18" font-weight="600" text-anchor="middle">智能决策引擎</text>
  
  <rect x="780" y="320" width="200" height="100" rx="14" fill="url(#alarmGrad)" filter="url(#shadow)"/>
  <text x="880" y="380" fill="white" font-size="18" font-weight="600" text-anchor="middle">干预指令下发</text>
  
  <rect x="1020" y="320" width="200" height="100" rx="14" fill="url(#cloudGrad)" filter="url(#shadow)"/>
  <text x="1120" y="380" fill="white" font-size="18" font-weight="600" text-anchor="middle">数据上报</text>
  
  <!-- 边侧箭头 - 增加线条长度 -->
  <line x1="260" y1="370" x2="295" y2="370" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="500" y1="370" x2="535" y2="370" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="740" y1="370" x2="775" y2="370" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="980" y1="370" x2="1015" y2="370" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== 端侧 ==================== -->
  <rect x="40" y="490" width="1320" height="180" rx="20" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.4)" stroke-width="2"/>
  <text x="110" y="530" fill="#10b981" font-size="24" font-weight="700">📱 端侧</text>
  
  <rect x="60" y="550" width="200" height="100" rx="14" fill="url(#deviceGrad)" filter="url(#shadow)"/>
  <text x="160" y="610" fill="white" font-size="18" font-weight="600" text-anchor="middle">K01 主控</text>
  
  <rect x="300" y="550" width="220" height="100" rx="14" fill="url(#deviceGrad)" filter="url(#shadow)"/>
  <text x="410" y="610" fill="white" font-size="18" font-weight="600" text-anchor="middle">麦克风 + IMU</text>
  
  <rect x="560" y="550" width="200" height="100" rx="14" fill="url(#cloudGrad)" filter="url(#shadow)"/>
  <text x="660" y="610" fill="white" font-size="18" font-weight="600" text-anchor="middle">星闪 SLE</text>
  
  <rect x="800" y="550" width="200" height="100" rx="14" fill="url(#alarmGrad)" filter="url(#shadow)"/>
  <text x="900" y="610" fill="white" font-size="18" font-weight="600" text-anchor="middle">声光报警</text>
  
  <rect x="1040" y="550" width="180" height="100" rx="14" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="2"/>
  <text x="1130" y="610" fill="#22c55e" font-size="18" font-weight="600" text-anchor="middle">隐私保护</text>
  
  <!-- 端侧箭头 - 增加线条长度 -->
  <line x1="260" y1="600" x2="295" y2="600" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="520" y1="600" x2="555" y2="600" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  <line x1="760" y1="600" x2="795" y2="600" stroke="#64748b" stroke-width="3" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== 垂直连接 ==================== -->
  <!-- 端侧到边侧 - 左侧上行 -->
  <path d="M 660 550 L 660 480 L 60 480 L 60 435" stroke="#10b981" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="350" y="472" fill="#10b981" font-size="16" font-weight="600">数据上行 ↑</text>
  
  <!-- 边侧到端侧 - 右侧下行 -->
  <path d="M 880 420 L 880 470 L 900 470 L 900 535" stroke="#ef4444" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>
  <text x="920" y="482" fill="#ef4444" font-size="16" font-weight="600">干预指令 ↓</text>
  
  <!-- 边侧到云侧 - 右侧上行 -->
  <path d="M 1120 320 L 1120 240 L 1320 240 L 1320 195" stroke="#3b82f6" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1180" y="232" fill="#3b82f6" font-size="16" font-weight="600">事件上报 ↑</text>
  
  <!-- OTA更新 - 云侧左下到边侧左侧，完全避开边侧文字 -->
  <path d="M 505 190 L 505 250 L 50 250 L 50 305" stroke="#14b8a6" stroke-width="4" fill="none" stroke-dasharray="10,5" marker-end="url(#arrowTeal)"/>
  <text x="260" y="242" fill="#14b8a6" font-size="16" font-weight="600">OTA模型更新 ↓</text>
  
  <!-- ==================== 底部说明 ==================== -->
  <rect x="40" y="700" width="1320" height="80" rx="16" fill="rgba(30,41,59,0.5)" stroke="rgba(71,85,105,0.3)" stroke-width="1"/>
  
  <text x="80" y="745" fill="#f1f5f9" font-size="18" font-weight="600">核心特点:</text>
  
  <circle cx="220" cy="740" r="10" fill="#ec4899"/>
  <text x="245" y="747" fill="#cbd5e1" font-size="16">多模态检测</text>
  
  <circle cx="420" cy="740" r="10" fill="#ef4444"/>
  <text x="445" y="747" fill="#cbd5e1" font-size="16">声光干预</text>
  
  <circle cx="600" cy="740" r="10" fill="#8b5cf6"/>
  <text x="625" y="747" fill="#cbd5e1" font-size="16">多方联动</text>
  
  <circle cx="780" cy="740" r="10" fill="#14b8a6"/>
  <text x="805" y="747" fill="#cbd5e1" font-size="16">增量训练</text>
  
  <circle cx="960" cy="740" r="10" fill="#22c55e"/>
  <text x="985" y="747" fill="#cbd5e1" font-size="16">隐私保护</text>
  
  <text x="1150" y="747" fill="#64748b" font-size="14">闭环自进化</text>
</svg>
