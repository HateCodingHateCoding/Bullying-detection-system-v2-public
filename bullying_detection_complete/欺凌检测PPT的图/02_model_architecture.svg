<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="imuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="temporalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="classifierGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- 箭头定义 - 使用refX=10让线条不盖住箭头 -->
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#ec4899"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#10b981"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#8b5cf6"/>
    </marker>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- ==================== 输入层 ==================== -->
  <text x="100" y="60" fill="#1e293b" font-size="22" font-weight="700">输入</text>
  
  <rect x="40" y="90" width="180" height="130" rx="16" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="3"/>
  <text x="130" y="145" fill="#818cf8" font-size="20" font-weight="700" text-anchor="middle">音频</text>
  <text x="130" y="180" fill="#818cf8" font-size="18" text-anchor="middle">(1,64,128)</text>
  
  <rect x="40" y="260" width="180" height="130" rx="16" fill="rgba(236,72,153,0.15)" stroke="#ec4899" stroke-width="3"/>
  <text x="130" y="315" fill="#f472b6" font-size="20" font-weight="700" text-anchor="middle">振动</text>
  <text x="130" y="350" fill="#f472b6" font-size="18" text-anchor="middle">(200,6)</text>
  
  <!-- ==================== 特征提取层 ==================== -->
  <text x="320" y="60" fill="#1e293b" font-size="22" font-weight="700">特征提取</text>
  
  <rect x="270" y="90" width="220" height="130" rx="16" fill="url(#audioGrad)" filter="url(#shadow)"/>
  <text x="380" y="145" fill="white" font-size="20" font-weight="700" text-anchor="middle">Audio CNN</text>
  <text x="380" y="180" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">4层卷积 → 256维</text>
  
  <rect x="270" y="260" width="220" height="130" rx="16" fill="url(#imuGrad)" filter="url(#shadow)"/>
  <text x="380" y="315" fill="white" font-size="20" font-weight="700" text-anchor="middle">IMU BiLSTM</text>
  <text x="380" y="350" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">双向LSTM → 128维</text>
  
  <!-- 输入到特征提取连接线 -->
  <line x1="220" y1="155" x2="270" y2="155" stroke="#6366f1" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="220" y1="325" x2="270" y2="325" stroke="#ec4899" stroke-width="4" marker-end="url(#arrowPink)"/>
  
  <!-- ==================== 融合层 ==================== -->
  <text x="600" y="60" fill="#1e293b" font-size="22" font-weight="700">多模态融合</text>
  
  <rect x="540" y="150" width="240" height="170" rx="16" fill="url(#fusionGrad)" filter="url(#shadow)"/>
  <text x="660" y="215" fill="white" font-size="20" font-weight="700" text-anchor="middle">跨模态注意力</text>
  <text x="660" y="255" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">Cross-Modal</text>
  <text x="660" y="290" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">Attention → 128维</text>
  
  <!-- 特征到融合连接线 -->
  <path d="M 490 155 L 515 155 L 515 200 L 540 200" stroke="#6366f1" stroke-width="4" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 490 325 L 515 325 L 515 270 L 540 270" stroke="#ec4899" stroke-width="4" fill="none" marker-end="url(#arrowOrange)"/>
  
  <!-- ==================== 时序上下文 ==================== -->
  <text x="880" y="60" fill="#1e293b" font-size="22" font-weight="700">时序分析</text>
  
  <rect x="830" y="150" width="200" height="170" rx="16" fill="url(#temporalGrad)" filter="url(#shadow)"/>
  <text x="930" y="215" fill="white" font-size="20" font-weight="700" text-anchor="middle">时序上下文</text>
  <text x="930" y="255" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">Temporal</text>
  <text x="930" y="290" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">Context → 64维</text>
  
  <!-- 融合到时序连接线 -->
  <line x1="780" y1="235" x2="830" y2="235" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrowCyan)"/>
  
  <!-- ==================== 分类器 ==================== -->
  <text x="1130" y="60" fill="#1e293b" font-size="22" font-weight="700">分类输出</text>
  
  <rect x="1080" y="90" width="250" height="130" rx="16" fill="url(#classifierGrad)" filter="url(#shadow)"/>
  <text x="1205" y="145" fill="white" font-size="20" font-weight="700" text-anchor="middle">特征拼接</text>
  <text x="1205" y="180" fill="rgba(255,255,255,0.8)" font-size="16" text-anchor="middle">576维 → MLP</text>
  
  <rect x="1080" y="260" width="250" height="130" rx="16" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="1205" y="315" fill="white" font-size="22" font-weight="700" text-anchor="middle">P(欺凌)</text>
  <text x="1205" y="355" fill="rgba(255,255,255,0.9)" font-size="20" text-anchor="middle">[0, 1]</text>
  
  <!-- 时序到分类器连接线 -->
  <path d="M 1030 235 L 1055 235 L 1055 155 L 1080 155" stroke="#06b6d4" stroke-width="4" fill="none" marker-end="url(#arrowPurple)"/>
  
  <!-- 分类器内部连接线 -->
  <line x1="1205" y1="220" x2="1205" y2="260" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrowGreen)"/>
  
  <!-- 跳跃连接 (虚线) - 位置调整避免重叠 -->
  <path d="M 490 120 L 520 120 L 520 40 L 1055 40 L 1055 120 L 1080 120" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10,5" marker-end="url(#arrowGray)"/>
  <path d="M 490 360 L 520 360 L 520 430 L 1055 430 L 1055 190 L 1080 190" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10,5" marker-end="url(#arrowGray)"/>
  <text x="750" y="32" fill="#64748b" font-size="15" font-weight="600">跳跃连接 (Skip Connection)</text>
  
  <!-- ==================== 训练配置 - 透明背景 ==================== -->
  <rect x="40" y="480" width="1290" height="170" rx="16" fill="rgba(100,116,139,0.08)" stroke="rgba(100,116,139,0.2)" stroke-width="2"/>
  
  <text x="100" y="530" fill="#475569" font-size="22" font-weight="700">训练配置</text>
  
  <rect x="80" y="560" width="160" height="70" rx="12" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="603" fill="#ef4444" font-size="18" font-weight="600" text-anchor="middle">Focal Loss</text>
  
  <rect x="270" y="560" width="160" height="70" rx="12" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="603" fill="#3b82f6" font-size="18" font-weight="600" text-anchor="middle">Adam优化器</text>
  
  <rect x="460" y="560" width="160" height="70" rx="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="540" y="603" fill="#10b981" font-size="18" font-weight="600" text-anchor="middle">Cosine LR</text>
  
  <rect x="650" y="560" width="160" height="70" rx="12" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="603" fill="#8b5cf6" font-size="18" font-weight="600" text-anchor="middle">数据增强</text>
  
  <rect x="840" y="560" width="160" height="70" rx="12" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2"/>
  <text x="920" y="603" fill="#f59e0b" font-size="18" font-weight="600" text-anchor="middle">MindSpore</text>
  
  <rect x="1030" y="560" width="160" height="70" rx="12" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="1110" y="603" fill="#f97316" font-size="18" font-weight="600" text-anchor="middle">昇腾NPU</text>
  
  <!-- ==================== 底部说明 - 透明背景 ==================== -->
  <rect x="40" y="680" width="1290" height="200" rx="16" fill="rgba(100,116,139,0.08)" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  
  <text x="80" y="730" fill="#475569" font-size="18" font-weight="600">模型特点:</text>
  
  <circle cx="200" cy="725" r="10" fill="#6366f1"/>
  <text x="225" y="732" fill="#475569" font-size="16">多模态融合</text>
  
  <circle cx="380" cy="725" r="10" fill="#f59e0b"/>
  <text x="405" y="732" fill="#475569" font-size="16">跨模态注意力</text>
  
  <circle cx="580" cy="725" r="10" fill="#06b6d4"/>
  <text x="605" y="732" fill="#475569" font-size="16">时序建模</text>
  
  <circle cx="750" cy="725" r="10" fill="#8b5cf6"/>
  <text x="775" y="732" fill="#475569" font-size="16">跳跃连接</text>
  
  <circle cx="920" cy="725" r="10" fill="#10b981"/>
  <text x="945" y="732" fill="#475569" font-size="16">端到端训练</text>
  
  <text x="80" y="800" fill="#475569" font-size="18" font-weight="600">性能指标:</text>
  <text x="200" y="800" fill="#64748b" font-size="16">推理延迟 &lt;100ms  |  检测准确率 &gt;95%  |  误报率 &lt;5%  |  参数量 ~2M</text>
</svg>
