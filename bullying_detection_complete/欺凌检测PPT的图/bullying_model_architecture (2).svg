<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    
    <linearGradient id="vibrationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    
    <linearGradient id="attentionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <linearGradient id="temporalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    
    <linearGradient id="classifierGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#ec4899"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#10b981"/>
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Background pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>
  
  <!-- Decorative glows -->
  <ellipse cx="120" cy="250" rx="150" ry="120" fill="rgba(99,102,241,0.06)"/>
  <ellipse cx="1080" cy="350" rx="150" ry="120" fill="rgba(16,185,129,0.06)"/>
  
  <!-- Title -->
  <text x="600" y="45" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif">校园霸凌检测多模态融合模型</text>
  <text x="600" y="70" fill="#64748b" font-size="13" text-anchor="middle" font-family="monospace">BullyingDetectionModel · MindSpore on Ascend</text>
  
  <!-- ========== ROW 1: Audio Path ========== -->
  
  <!-- Input: Audio -->
  <rect x="40" y="130" width="130" height="80" rx="10" fill="rgba(99,102,241,0.12)" stroke="#818cf8" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="105" y="160" fill="#818cf8" font-size="13" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">🎙️ 梅尔频谱</text>
  <text x="105" y="180" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">(B, 1, 64, 128)</text>
  <text x="105" y="198" fill="#475569" font-size="9" text-anchor="middle">Mel Spectrogram</text>
  
  <!-- Audio Feature Extractor -->
  <rect x="230" y="115" width="170" height="110" rx="12" fill="url(#audioGrad)" filter="url(#shadow)"/>
  <text x="315" y="150" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">声音特征提取器</text>
  <text x="315" y="170" fill="rgba(255,255,255,0.7)" font-size="9" text-anchor="middle" font-family="monospace">AudioFeatureExtractor</text>
  <line x1="250" y1="185" x2="380" y2="185" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="315" y="203" fill="rgba(255,255,255,0.9)" font-size="10" text-anchor="middle">4×Conv2d + BN + Pool</text>
  <text x="315" y="218" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle" font-family="monospace">输出: (B, 256)</text>
  
  <!-- ========== ROW 2: Vibration Path ========== -->
  
  <!-- Input: Vibration -->
  <rect x="40" y="390" width="130" height="80" rx="10" fill="rgba(236,72,153,0.12)" stroke="#f472b6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="105" y="420" fill="#f472b6" font-size="13" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">📳 振动序列</text>
  <text x="105" y="440" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">(B, 200, 6)</text>
  <text x="105" y="458" fill="#475569" font-size="9" text-anchor="middle">Gyro + Accelerometer</text>
  
  <!-- Vibration Feature Extractor -->
  <rect x="230" y="375" width="170" height="110" rx="12" fill="url(#vibrationGrad)" filter="url(#shadow)"/>
  <text x="315" y="410" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">振动特征提取器</text>
  <text x="315" y="430" fill="rgba(255,255,255,0.7)" font-size="9" text-anchor="middle" font-family="monospace">VibrationFeatureExtractor</text>
  <line x1="250" y1="445" x2="380" y2="445" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="315" y="463" fill="rgba(255,255,255,0.9)" font-size="10" text-anchor="middle">Conv1d + Bi-LSTM</text>
  <text x="315" y="478" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle" font-family="monospace">输出: (B, 128)</text>
  
  <!-- ========== CENTER: Fusion Modules ========== -->
  
  <!-- Cross-Modal Attention -->
  <rect x="480" y="215" width="160" height="110" rx="12" fill="url(#attentionGrad)" filter="url(#shadow)"/>
  <text x="560" y="250" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">跨模态注意力</text>
  <text x="560" y="270" fill="rgba(255,255,255,0.7)" font-size="9" text-anchor="middle" font-family="monospace">CrossModalAttention</text>
  <line x1="500" y1="285" x2="620" y2="285" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="560" y="303" fill="rgba(255,255,255,0.9)" font-size="10" text-anchor="middle">模态关联学习</text>
  <text x="560" y="318" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle" font-family="monospace">输出: (B, 128)</text>
  
  <!-- Temporal Context -->
  <rect x="480" y="360" width="160" height="95" rx="12" fill="url(#temporalGrad)" filter="url(#shadow)"/>
  <text x="560" y="395" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">时序上下文</text>
  <text x="560" y="415" fill="rgba(255,255,255,0.7)" font-size="9" text-anchor="middle" font-family="monospace">TemporalContextModule</text>
  <line x1="500" y1="428" x2="620" y2="428" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="560" y="446" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle" font-family="monospace">输出: (B, 64)</text>
  
  <!-- ========== Concat Symbol (moved right by 80px) ========== -->
  <circle cx="810" cy="300" r="30" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="810" y="308" fill="#f1f5f9" font-size="26" font-weight="bold" text-anchor="middle" font-family="sans-serif">⊕</text>
  <text x="810" y="350" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="monospace">Concat</text>
  <text x="810" y="365" fill="#64748b" font-size="9" text-anchor="middle" font-family="monospace">(B, 576)</text>
  
  <!-- ========== RIGHT: Classifier & Output (moved right by 80px) ========== -->
  
  <!-- Classifier -->
  <rect x="920" y="170" width="150" height="105" rx="12" fill="url(#classifierGrad)" filter="url(#shadow)"/>
  <text x="995" y="205" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">分类器</text>
  <text x="995" y="225" fill="rgba(255,255,255,0.7)" font-size="9" text-anchor="middle" font-family="monospace">Classifier MLP</text>
  <line x1="940" y1="240" x2="1050" y2="240" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="995" y="258" fill="rgba(255,255,255,0.9)" font-size="10" text-anchor="middle">576→256→128→64→1</text>
  <text x="995" y="270" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle">Dropout: 0.5 / 0.3</text>
  
  <!-- Output -->
  <rect x="920" y="320" width="150" height="100" rx="12" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="995" y="355" fill="white" font-size="14" font-weight="600" text-anchor="middle" font-family="SF Pro Display, sans-serif">霸凌概率输出</text>
  <text x="995" y="385" fill="white" font-size="22" font-weight="700" text-anchor="middle" font-family="SF Pro Display, sans-serif">P ∈ [0,1]</text>
  <text x="995" y="410" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle" font-family="monospace">Sigmoid</text>
  
  <!-- ========== CONNECTION LINES ========== -->
  
  <!-- Input to Extractors (horizontal lines) -->
  <line x1="170" y1="170" x2="225" y2="170" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="170" y1="430" x2="225" y2="430" stroke="#f472b6" stroke-width="2.5" marker-end="url(#arrowPink)"/>
  
  <!-- Audio Extractor to Attention (curved) -->
  <path d="M 400 170 L 430 170 Q 455 170 455 220 L 455 265 Q 455 270 460 270 L 475 270" stroke="#6366f1" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="432" y="220" fill="#6366f1" font-size="9" font-family="monospace">256</text>
  
  <!-- Vibration Extractor to Attention (curved) -->
  <path d="M 400 430 L 430 430 Q 455 430 455 380 L 455 295 Q 455 290 460 290 L 475 290" stroke="#ec4899" stroke-width="2.5" fill="none" marker-end="url(#arrowPink)"/>
  <text x="432" y="380" fill="#ec4899" font-size="9" font-family="monospace">128</text>
  
  <!-- Attention to Temporal (vertical) -->
  <line x1="560" y1="325" x2="560" y2="355" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Attention to Concat -->
  <path d="M 640 260 L 720 260 Q 740 260 740 280 L 740 290 Q 740 295 750 295 L 775 295" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="700" y="252" fill="#f59e0b" font-size="9" font-family="monospace">128</text>
  
  <!-- Temporal to Concat -->
  <path d="M 640 407 L 720 407 Q 740 407 740 350 L 740 315 Q 740 310 750 310 L 775 310" stroke="#06b6d4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="700" y="420" fill="#06b6d4" font-size="9" font-family="monospace">64</text>
  
  <!-- Skip connections (dashed) -->
  <!-- Audio skip to Concat -->
  <path d="M 400 140 L 450 140 Q 460 140 460 130 L 460 110 Q 460 100 470 100 L 750 100 Q 760 100 760 110 L 760 270 Q 760 280 770 280 L 775 280" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="600" y="93" fill="#6366f1" font-size="9" font-family="monospace">256 (skip)</text>
  
  <!-- Vibration skip to Concat -->
  <path d="M 400 460 L 450 460 Q 460 460 460 470 L 460 490 Q 460 500 470 500 L 750 500 Q 760 500 760 490 L 760 330 Q 760 320 770 320 L 775 320" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowPink)"/>
  <text x="600" y="512" fill="#ec4899" font-size="9" font-family="monospace">128 (skip)</text>
  
  <!-- Concat to Classifier -->
  <path d="M 840 300 L 870 300 Q 890 300 890 260 L 890 225 Q 890 220 900 220 L 915 220" stroke="#8b5cf6" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="875" y="265" fill="#8b5cf6" font-size="9" font-family="monospace">576</text>
  
  <!-- Classifier to Output -->
  <line x1="995" y1="275" x2="995" y2="315" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  
  <!-- ========== LEGEND ========== -->
  <rect x="40" y="520" width="1120" height="160" rx="12" fill="rgba(30,41,59,0.6)" stroke="rgba(71,85,105,0.3)" stroke-width="1"/>
  
  <text x="70" y="550" fill="#f1f5f9" font-size="14" font-weight="600" font-family="SF Pro Display, sans-serif">模型架构说明</text>
  
  <!-- Color legend -->
  <rect x="70" y="570" width="16" height="16" rx="4" fill="url(#audioGrad)"/>
  <text x="92" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">音频特征流 (256维)</text>
  
  <rect x="230" y="570" width="16" height="16" rx="4" fill="url(#vibrationGrad)"/>
  <text x="252" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">振动特征流 (128维)</text>
  
  <rect x="400" y="570" width="16" height="16" rx="4" fill="url(#attentionGrad)"/>
  <text x="422" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">注意力融合 (128维)</text>
  
  <rect x="570" y="570" width="16" height="16" rx="4" fill="url(#temporalGrad)"/>
  <text x="592" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">时序上下文 (64维)</text>
  
  <!-- Line type legend -->
  <line x1="750" y1="578" x2="790" y2="578" stroke="#64748b" stroke-width="2"/>
  <text x="800" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">主数据流</text>
  
  <line x1="890" y1="578" x2="930" y2="578" stroke="#64748b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="940" y="583" fill="#94a3b8" font-size="11" font-family="SF Pro Display, sans-serif">跳跃连接</text>
  
  <!-- Technical details -->
  <line x1="70" y1="605" x2="1130" y2="605" stroke="rgba(71,85,105,0.3)" stroke-width="1"/>
  
  <text x="70" y="630" fill="#64748b" font-size="11" font-family="monospace">特征拼接维度: 融合特征(128) + 时序特征(64) + 音频原始(256) + 振动原始(128) = 576</text>
  <text x="70" y="650" fill="#64748b" font-size="11" font-family="monospace">损失函数: Focal Loss (α=0.25, γ=2.0) / Weighted BCE (pos_weight=2.0)</text>
  <text x="70" y="670" fill="#64748b" font-size="11" font-family="monospace">框架: MindSpore GRAPH_MODE · 设备: Ascend NPU</text>
  
  <text x="1100" y="670" fill="#475569" font-size="10" text-anchor="end" font-family="SF Pro Display, sans-serif">三英战ICT团队</text>
</svg>
