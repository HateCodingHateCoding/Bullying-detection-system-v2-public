<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="huaweiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cf0a2c"/>
      <stop offset="100%" stop-color="#a00820"/>
    </linearGradient>
    <linearGradient id="mindsporeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="modelartsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="iotdaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="ascendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangepiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="k01Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- ==================== 云侧开发平台 ==================== -->
  <rect x="40" y="30" width="1120" height="170" rx="16" fill="rgba(207,10,44,0.1)" stroke="rgba(207,10,44,0.4)" stroke-width="2"/>
  
  <rect x="60" y="45" width="120" height="35" rx="8" fill="url(#huaweiGrad)" filter="url(#shadow)"/>
  <text x="120" y="70" fill="white" font-size="16" font-weight="700" text-anchor="middle">华为云</text>
  
  <rect x="60" y="95" width="150" height="85" rx="12" fill="url(#iotdaGrad)" filter="url(#shadow)"/>
  <text x="135" y="145" fill="white" font-size="18" font-weight="600" text-anchor="middle">IoTDA</text>
  
  <rect x="230" y="95" width="150" height="85" rx="12" fill="url(#obsGrad)" filter="url(#shadow)"/>
  <text x="305" y="145" fill="white" font-size="18" font-weight="600" text-anchor="middle">OBS</text>
  
  <rect x="400" y="95" width="180" height="85" rx="12" fill="url(#modelartsGrad)" filter="url(#shadow)"/>
  <text x="490" y="145" fill="white" font-size="18" font-weight="600" text-anchor="middle">ModelArts</text>
  
  <rect x="600" y="95" width="180" height="85" rx="12" fill="url(#mindsporeGrad)" filter="url(#shadow)"/>
  <text x="690" y="145" fill="white" font-size="18" font-weight="600" text-anchor="middle">MindSpore</text>
  
  <rect x="800" y="95" width="160" height="85" rx="12" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="880" y="145" fill="#a78bfa" font-size="18" font-weight="600" text-anchor="middle">FunctionGraph</text>
  
  <rect x="980" y="95" width="150" height="85" rx="12" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2"/>
  <text x="1055" y="145" fill="#fbbf24" font-size="18" font-weight="600" text-anchor="middle">SMN</text>
  
  <!-- ==================== 边侧开发平台 ==================== -->
  <rect x="40" y="230" width="540" height="200" rx="16" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.4)" stroke-width="2"/>
  
  <rect x="60" y="245" width="180" height="35" rx="8" fill="url(#orangepiGrad)" filter="url(#shadow)"/>
  <text x="150" y="270" fill="white" font-size="16" font-weight="700" text-anchor="middle">边侧开发平台</text>
  
  <rect x="60" y="295" width="160" height="115" rx="12" fill="url(#orangepiGrad)" filter="url(#shadow)"/>
  <text x="140" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">香橙派</text>
  <text x="140" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">AI Pro</text>
  
  <rect x="240" y="295" width="160" height="115" rx="12" fill="url(#ascendGrad)" filter="url(#shadow)"/>
  <text x="320" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">昇腾310</text>
  <text x="320" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">NPU</text>
  
  <rect x="420" y="295" width="140" height="115" rx="12" fill="url(#pythonGrad)" filter="url(#shadow)"/>
  <text x="490" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">Python</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">MindSpore</text>
  
  <!-- ==================== 端侧开发平台 ==================== -->
  <rect x="620" y="230" width="540" height="200" rx="16" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.4)" stroke-width="2"/>
  
  <rect x="640" y="245" width="180" height="35" rx="8" fill="url(#k01Grad)" filter="url(#shadow)"/>
  <text x="730" y="270" fill="white" font-size="16" font-weight="700" text-anchor="middle">端侧开发平台</text>
  
  <rect x="640" y="295" width="160" height="115" rx="12" fill="url(#k01Grad)" filter="url(#shadow)"/>
  <text x="720" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">K01</text>
  <text x="720" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">Hi3861</text>
  
  <rect x="820" y="295" width="160" height="115" rx="12" fill="url(#sleGrad)" filter="url(#shadow)"/>
  <text x="900" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">D02</text>
  <text x="900" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">星闪SLE</text>
  
  <rect x="1000" y="295" width="140" height="115" rx="12" fill="url(#cGrad)" filter="url(#shadow)"/>
  <text x="1070" y="345" fill="white" font-size="16" font-weight="600" text-anchor="middle">C语言</text>
  <text x="1070" y="375" fill="rgba(255,255,255,0.8)" font-size="14" text-anchor="middle">HarmonyOS</text>
  
  <!-- ==================== 开发工具链 ==================== -->
  <rect x="40" y="460" width="1120" height="120" rx="16" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
  
  <rect x="60" y="475" width="140" height="35" rx="8" fill="url(#pythonGrad)" filter="url(#shadow)"/>
  <text x="130" y="500" fill="white" font-size="16" font-weight="700" text-anchor="middle">开发工具</text>
  
  <rect x="60" y="525" width="200" height="40" rx="10" fill="rgba(236,72,153,0.15)" stroke="#ec4899" stroke-width="2"/>
  <text x="160" y="552" fill="#f472b6" font-size="15" font-weight="600" text-anchor="middle">ModelArts Notebook</text>
  
  <rect x="280" y="525" width="200" height="40" rx="10" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="380" y="552" fill="#a78bfa" font-size="15" font-weight="600" text-anchor="middle">VS Code SSH</text>
  
  <rect x="500" y="525" width="200" height="40" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="552" fill="#34d399" font-size="15" font-weight="600" text-anchor="middle">DevEco Tool</text>
  
  <rect x="720" y="525" width="200" height="40" rx="10" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="2"/>
  <text x="820" y="552" fill="#22d3ee" font-size="15" font-weight="600" text-anchor="middle">串口调试</text>
  
  <rect x="940" y="525" width="200" height="40" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="1040" y="552" fill="#fbbf24" font-size="15" font-weight="600" text-anchor="middle">Git + CI/CD</text>
  
  <!-- ==================== 技术栈标签 ==================== -->
  <rect x="40" y="610" width="1120" height="70" rx="12" fill="rgba(30,41,59,0.5)" stroke="rgba(71,85,105,0.3)" stroke-width="1"/>
  
  <text x="80" y="650" fill="#f1f5f9" font-size="16" font-weight="600">核心技术:</text>
  
  <rect x="180" y="632" width="90" height="28" rx="6" fill="url(#huaweiGrad)"/>
  <text x="225" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">华为云</text>
  
  <rect x="285" y="632" width="100" height="28" rx="6" fill="url(#mindsporeGrad)"/>
  <text x="335" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">MindSpore</text>
  
  <rect x="400" y="632" width="90" height="28" rx="6" fill="url(#ascendGrad)"/>
  <text x="445" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">昇腾NPU</text>
  
  <rect x="505" y="632" width="100" height="28" rx="6" fill="url(#orangepiGrad)"/>
  <text x="555" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">香橙派</text>
  
  <rect x="620" y="632" width="60" height="28" rx="6" fill="url(#k01Grad)"/>
  <text x="650" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">K01</text>
  
  <rect x="695" y="632" width="80" height="28" rx="6" fill="url(#sleGrad)"/>
  <text x="735" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">星闪</text>
  
  <rect x="790" y="632" width="80" height="28" rx="6" fill="url(#pythonGrad)"/>
  <text x="830" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">Python</text>
  
  <rect x="885" y="632" width="50" height="28" rx="6" fill="url(#cGrad)"/>
  <text x="910" y="652" fill="white" font-size="13" font-weight="500" text-anchor="middle">C</text>
</svg>